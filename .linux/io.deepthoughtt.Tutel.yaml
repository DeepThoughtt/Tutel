id: io.deepthoughtt.Tutel
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: tutel

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  - name: tutel
    buildsystem: simple
    build-commands:
      - install -D tutel /app/bin/tutel
      - cp -r assets /app/bin/
      - cp -r _internal /app/bin/
      - cp -r l10n /app/bin/
      - install -D ../../.linux/io.deepthoughtt.Tutel.desktop /app/share/applications/io.deepthoughtt.Tutel.desktop
      - install -D ../../.linux/io.deepthoughtt.Tutel.png /app/share/icons/hicolor/256x256/apps/io.deepthoughtt.Tutel.png
    sources:
      - type: dir
        path: ../dist/Tutel/
        dest: .
